github/workflows/build.yml
nom : Build Android APK on : push : branches : [ main, master ] workflow_dispatch : {} jobs : build : runs-on : ubuntu-latest steps : - uses : actions/checkout@v4 - name : Extraire le projet si un zip est présent run : | if [ -f "quiz_biblique_app.zip" ]; then unzip -o quiz_biblique_app.zip -d extracted echo "PROJECT_DIR=extracted/quiz_biblique_app" >> $GITHUB_ENV else echo "PROJECT_DIR=." >> $GITHUB_ENV fi - uses: subosito/flutter-action@v2 with: flutter-version: '3.24.0' channel: 'stable' - name: Installer les dépendances working-directory: ${{ env.PROJECT_DIR }} run: flutter pub get - name: Compiler l'APK (release) working-directory: ${{ env.PROJECT_DIR }} run: flutter build apk --release - name: Publier l'APK comme résultat téléchargeable uses: actions/upload-artifact@v4 with: name: quiz-biblique-apk path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk

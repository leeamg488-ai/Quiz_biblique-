name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Décompresser le zip
        run: |
          unzip -o quiz_biblique_app.zip
          ls -la

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Générer les fichiers Android manquants
        run: |
          cd quiz_biblique_app
          flutter create --platforms=android --org com.quizbiblique .

      - name: Appliquer le nom d'affichage de l'app
        run: |
          cd quiz_biblique_app
          sed -i 's/android:label="[^"]*"/android:label="Quiz Biblique"/' android/app/src/main/AndroidManifest.xml

      - name: Installer les dépendances
        run: |
          cd quiz_biblique_app
          flutter pub get

      - name: Générer l'icône de l'app
        run: |
          cd quiz_biblique_app
          dart run flutter_launcher_icons

      - name: Compiler l'APK avec logs détaillés
        run: |
          cd quiz_biblique_app
          flutter build apk --release -v

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quiz-biblique-apk
          path: quiz_biblique_app/build/app/outputs/flutter-apk/app-release.apk

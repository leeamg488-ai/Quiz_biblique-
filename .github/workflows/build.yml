name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Décompresser le zip
        run: |
          unzip -o quiz_biblique_app.zip
          ls -la

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Compiler l'APK
        run: |
          cd quiz_biblique_app
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quiz-biblique-apk
          path: quiz_biblique_app/build/app/outputs/flutter-apk/app-release.apk

Voilà les deux fichiers à uploader (le processus reste le même que d'habitude) :

**Ce que j'ai changé, "tout à la fois" comme demandé :**

**Couleurs / thème** — palette cohérente inspirée d'un manuscrit ancien plutôt que les couleurs Material par défaut :
- Fond parchemin (crème chaud), encre indigo profond, reflets dorés
- Bonne réponse en vert sauge, mauvaise en brique — moins criards que le vert/rouge Material standard
- Deux polices : une serif (Spectral) pour les titres à l'esprit manuscrit, une sans-serif lisible (Source Sans) pour le texte courant

**Icône de l'app** — un sceau rond indigo cerclé d'or avec la lettre hébraïque **א** (aleph, symbole du commencement) au centre, générée automatiquement en toutes les tailles Android requises

**Nom affiché** — "Quiz Biblique" au lieu du nom technique par défaut

**Mise en page** — écran de résultat repensé avec un sceau doré (écho de l'icône) et une appréciation selon le score ("Excellent !", "Bien joué", etc.)

**Pour mettre à jour :**
1. Remplacez `quiz_biblique_app.zip` sur GitHub (supprimer l'ancien, uploader le nouveau)
2. Remplacez le contenu de `.github/workflows/build.yml` par la nouvelle version (deux étapes de plus : nom de l'app + génération d'icône)
3. Attendez le build vert, téléchargez l'APK, réinstallez

Cette fois la compilation prendra un peu plus longtemps (récupération des polices + génération d'icônes). Envoyez-moi une capture si un souci apparaît, sinon dites-moi ce que ça donne une fois installé !
